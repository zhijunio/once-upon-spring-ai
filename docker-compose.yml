services:
  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-spring_ai}
      POSTGRES_USER: ${POSTGRES_USER:-spring_ai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-spring_ai}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-spring_ai} -d ${POSTGRES_DB:-spring_ai}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
