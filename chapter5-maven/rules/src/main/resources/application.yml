spring:
  ai:
    openai:
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      api-key: ${DASHSCOPE_API_KEY}
      chat:
        options:
          model: ${DASHSCOPE_CHAT_MODEL:qwen3.6-plus}
      embedding:
        options:
          model: ${DASHSCOPE_EMBEDDING_MODEL:text-embedding-v3}
          dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: ${DASHSCOPE_EMBEDDING_DIMENSIONS:1024}
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:spring_ai}
    username: ${POSTGRES_USER:spring_ai}
    password: ${POSTGRES_PASSWORD:spring_ai}
